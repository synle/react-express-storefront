# CI Pipeline — runs on push to main or manual trigger.
# Installs deps, runs all tests, builds frontend. Fails the workflow if any step fails.
name: CI

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # Manual trigger from GitHub Actions tab

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      # ---- Node.js setup ----
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      # ---- Backend ----
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci || npm install --no-fund --prefer-offline

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-node${{ matrix.node-version }}
          path: backend/coverage/
          retention-days: 7

      # ---- Frontend ----
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci || npm install --no-fund --prefer-offline

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-node${{ matrix.node-version }}
          path: frontend/coverage/
          retention-days: 7

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ---- Summary ----
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-node${{ matrix.node-version }}
          path: frontend/dist/
          retention-days: 7
